name: CI — Lint & Build

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  lint:
    name: Lint (flake8)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.10"

      - name: Install linting tools
        run: pip install flake8

      - name: Run flake8
        run: |
          flake8 src/ \
            --max-line-length=100 \
            --ignore=E501,W503 \
            --exclude=__pycache__

  docker-build:
    name: Docker build
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: false
          tags: receipt-ocr:ci
          cache-from: type=gha
          cache-to: type=gha,mode=max

